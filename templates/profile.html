{% extends "base.html" %}
{% block title %}Fitness · Profile{% endblock %}

{% block content %}
<section class="card">
    <h1 class="h1">Your Profile</h1>
    <p class="muted">Update your personal information and preferences.</p>

    <form method="post" class="form">
        <div class="form__row">
            <div class="form__field">
                <label class="label" for="full_name">Full name</label>
                <input class="input" id="full_name" name="full_name" value="{{ profile.full_name or '' }}">
            </div>
            <div class="form__field">
                <label class="label" for="email">Email</label>
                <input class="input" id="email" name="email" type="email" value="{{ profile.email or '' }}">
            </div>
        </div>

        <div class="form__row">
            <div class="form__field">
                <label class="label" for="photo_url">Photo URL</label>
                <input class="input" id="photo_url" name="photo_url" placeholder="https://..." value="{{ profile.photo_url or '' }}">
            </div>
        </div>

        <div class="form__row">
            <div class="form__field">
                <label class="label" for="height_cm">Height (cm)</label>
                <input class="input" id="height_cm" name="height_cm" type="number" step="1" value="{{ profile.height_cm or '' }}">
            </div>
            <div class="form__field">
                <label class="label" for="weight_kg">Weight (kg)</label>
                <input class="input" id="weight_kg" name="weight_kg" type="number" step="0.1" value="{{ profile.weight_kg or '' }}">
            </div>
            <div class="form__field">
                <label class="label" for="age">Age</label>
                <input class="input" id="age" name="age" type="number" step="1" value="{{ profile.age or '' }}">
            </div>
        </div>

        <div class="form__row">
            <div class="form__field">
                <label class="label" for="gender">Gender</label>
                <select class="select" id="gender" name="gender">
                    <option value="">Not specified</option>
                    <option value="male" {% if profile.gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if profile.gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if profile.gender == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form__field">
                <label class="label" for="target_weight_kg">Target weight (kg)</label>
                <input class="input" id="target_weight_kg" name="target_weight_kg" type="number" step="0.1" value="{{ profile.target_weight_kg or '' }}">
            </div>
        </div>

        <div class="form__row">
            <div class="form__field">
                <label class="label" for="activity_level">Activity level</label>
                <select class="select" id="activity_level" name="activity_level">
                    <option value="sedentary" {% if profile.activity_level == 'sedentary' %}selected{% endif %}>Sedentary (little or no exercise)</option>
                    <option value="light" {% if profile.activity_level == 'light' %}selected{% endif %}>Light (1-3 days/week)</option>
                    <option value="moderate" {% if profile.activity_level == 'moderate' %}selected{% endif %}>Moderate (3-5 days/week)</option>
                    <option value="active" {% if profile.activity_level == 'active' %}selected{% endif %}>Active (6-7 days/week)</option>
                    <option value="very_active" {% if profile.activity_level == 'very_active' %}selected{% endif %}>Very active (athlete / physical job)</option>
                </select>
            </div>
        </div>

        <h3 class="h2" style="margin-top: 12px;">Body measurements (optional)</h3>
        <div class="form__row">
            <div class="form__field">
                <label class="label" for="chest_cm">Chest (cm)</label>
                <input class="input" id="chest_cm" name="chest_cm" type="number" step="1" value="{{ profile.chest_cm or '' }}">
            </div>
            <div class="form__field">
                <label class="label" for="waist_cm">Waist (cm)</label>
                <input class="input" id="waist_cm" name="waist_cm" type="number" step="1" value="{{ profile.waist_cm or '' }}">
            </div>
            <div class="form__field">
                <label class="label" for="hips_cm">Hips (cm)</label>
                <input class="input" id="hips_cm" name="hips_cm" type="number" step="1" value="{{ profile.hips_cm or '' }}">
            </div>
        </div>

        <div class="form__row">
            <div class="form__field">
                <label class="label" for="theme">Theme</label>
                <select class="select" id="theme" name="theme">
                    <option value="dark" {% if profile.theme == 'dark' %}selected{% endif %}>Dark (default)</option>
                    <option value="light" {% if profile.theme == 'light' %}selected{% endif %}>Light</option>
                </select>
            </div>
        </div>

        <div class="form__row">
            <button class="btn btn--primary" type="submit">Save profile</button>
            <a class="btn" href="{{ url_for('home') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
